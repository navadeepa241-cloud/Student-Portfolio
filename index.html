<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portfolio - Navadeep A</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(120deg, #a18cd1 0%, #fbc2eb 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            animation: fadeln 1s ease forwards;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            margin: 0 auto 25px;
            display: block;
            animation: popln 1s ease forwards;
        }

        h2 {
            color: #333;
            font-size: 26px;
            margin-bottom: 10px;
        }

        h4 {
            color: grey;
            font-size: 18px;
            margin-bottom: 25px;
            font-weight: normal;
        }

        p {
            color: grey;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .skill {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .skills span:hover{
            animation: popln 0.5s ease forwards;
            opacity: 0;
        }
        

        .btns {
            display: flex;
            flex-direction: row;
            gap: 12px;
            margin-bottom: 25px;
            justify-content: center;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 1s ease;
            color: white;
        }

        
        
        

        .btn-contact {
            background: #4ecdc4;
        }

        .btn-cv {
            background: #45b7d1;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .footer {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
        }
        @keyframes fadeln {
            from{
                opacity: 0;
                transform: translateY(20px);
            }
            to{
                opacity: 1;
                transform: translateY(0);
            }
            }
            @keyframes popln {
            from{transform:scale(2);}
            to{opacity:1;transform:scale(1);}
                
                
            }
        
    </style>
</head>
<body>
    <div class="card">
        <img src="Nani.jpeg" alt="Navadeep A">
        <h2>Navadeep A</h2>
        <h4>Computer Science & Engineering</h4>
        <p>I am a Computer Science and Engineering student from GECM Hassan. Learning about new technologies and developing skills in web development.</p>
        
        <div class="skills">
            <span class="skill">HTML</span>
            <span class="skill">CSS</span>
            <span class="skill">JavaScript</span>
            <span class="skill">React</span>
            <span class="skill">Node.js</span>
            <span class="skill">Java</span>
            <span class="skill">Python</span>
            <span class="skill">SQL</span>
        </div>
        
        <div class="btns">
           
            <button class="btn-contact"id="contactBtn">Contact Me</button>
            <button class="btn-cv" id="DownloadBtn">Download CV</button>
        </div>
        
        <div class="footer">
            <span>Location:📍 Kolar, Karnataka</span>
            <span >Experience: ⭐ Fresher</span>
        </div>
    </div>

    <script>
        let contactBtn = document.getElementById('contactBtn');
        contactBtn.addEventListener("click", function() {
            alert(" contact at: nani123@gmail.com");
        });
        let downloadBtn = document.getElementById('DownloadBtn');
        downloadBtn.addEventListener("click", function() {
            alert("Downloading CV");
        });
    </script>
</body>
</html>
